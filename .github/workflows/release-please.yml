name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  # Con skip-github-release, release-please nunca ejecuta el paso que reetiqueta
  # sus PRs de release a "autorelease: tagged". Sin esto, una PR de release
  # mergeada se queda en "pending" y release-please aborta para siempre con
  # "There are untagged, merged release PRs outstanding".
  tag-release-pr:
    runs-on: ubuntu-22.04
    permissions:
      pull-requests: write
    steps:
      - name: Marcar PRs de release mergeadas como tagged
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh label create "autorelease: tagged" --color ededed \
            --description "Release PR has been tagged" 2>/dev/null || true
          for pr in $(gh pr list --state merged --label "autorelease: pending" \
                        --json number --jq '.[].number'); do
            echo "Reetiquetando PR #$pr"
            gh pr edit "$pr" --add-label "autorelease: tagged" \
                             --remove-label "autorelease: pending"
          done

  release-please:
    runs-on: ubuntu-22.04
    needs: tag-release-pr
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
  publish:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - uses: azure/setup-helm@v4

      - name: Build chart dependencies
        run: |
          helm repo add chart-base https://hugorganization.github.io/chart_base
          for chart in umbrellas/*/; do
            helm dependency build "$chart"
          done

      - uses: helm/chart-releaser-action@v1.7.0
        with:
          charts_dir: umbrellas
          skip_existing: true
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}